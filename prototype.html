<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hebrew Bible Journey — Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #FAF8F4;
            --bg-card: #FFFFFF;
            --bg-surface: #F3F0EA;
            --text-primary: #1C1810;
            --text-secondary: #6B6458;
            --text-muted: #A89E92;
            --border: rgba(0,0,0,0.08);
            --border-mid: rgba(0,0,0,0.13);
            --purple: #534AB7;
            --purple-light: #EEEDFE;
            --purple-mid: #7F77DD;
            --red-light: #FEE2E2;
            --red-mid: #EF4444;
            --coral: #FF5F40;
            --blue: #3A86FF;
            --teal: #00BFA5;
            --green: #1D9E75;
            --radius: 10px;
            --radius-lg: 14px;
            --radius-pill: 99px;
            --font-body: 'Inter', sans-serif;
            --font-serif: 'Crimson Pro', serif;
            --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 8px rgba(0,0,0,0.04);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #141210;
                --bg-card: #1E1B17;
                --bg-surface: #252118;
                --text-primary: #F0EAE0;
                --text-secondary: #A89E92;
                --text-muted: #6B6458;
                --border: rgba(255,255,255,0.07);
                --border-mid: rgba(255,255,255,0.12);
                --purple-light: #1E1C3A;
                --purple-mid: #9590E0;
                --red-light: #450A0A;
                --red-mid: #F87171;
                --coral: #FF7E63;
                --blue: #6BA4FF;
                --teal: #2DD4B8;
                --shadow-card: 0 1px 3px rgba(0,0,0,0.3);
            }
        }

        html, body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 16px;
            line-height: 1.6;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: stretch;
            user-select: none;
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px 80px 40px;
            overflow: hidden;
            justify-content: space-between;
            height: 100vh;
        }

        /* VERSE HEADER */
        .verse-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 24px;
            flex-shrink: 0;
        }
        .verse-ref { font-family: var(--font-serif); font-size: 14px; color: var(--text-muted); }
        .progress-pill { font-size: 11px; background: var(--purple-light); color: var(--purple); padding: 2px 10px; border-radius: var(--radius-pill); font-weight: 600; }

        /* SCROLL TRACK */
        .scroll-track { position: relative; height: 240px; overflow: hidden; flex-shrink: 0; }
        .scroll-track::before, .scroll-track::after { content: ''; position: absolute; left: 0; right: 0; height: 55px; z-index: 2; pointer-events: none; }
        .scroll-track::before { top: 0; background: linear-gradient(to bottom, var(--bg), transparent); }
        .scroll-track::after  { bottom: 0; background: linear-gradient(to top, var(--bg), transparent); }
        .scroll-inner { position: absolute; top: 0; left: 0; right: 0; transition: transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94); }
        .verse-slot { direction: rtl; text-align: right; display: flex; align-items: center; transition: all 0.9s cubic-bezier(0.22,0.61,0.36,1); }
        .verse-slot.active   { opacity: 1; transform: scale(1); height: 160px; }
        .verse-slot.adjacent { opacity: 0.22; transform: scale(0.78); transform-origin: right center; height: 12px; overflow: visible; pointer-events: none; }
        .verse-slot.hidden   { opacity: 0; height: 12px; pointer-events: none; }
        .verse-inner-wrap { direction: rtl; text-align: right; width: 100%; }
        .verse-plain { font-family: 'Times New Roman', serif; font-size: 24px; direction: rtl; text-align: right; color: var(--text-primary); }
        .word-block { display: inline-flex; flex-direction: column; align-items: center; gap: 2px; padding: 3px 6px; border-radius: var(--radius); border: 1.5px solid transparent; transition: all 0.2s; vertical-align: top; }
        .word-block.active-word { background: var(--purple-light); border-color: var(--purple-mid); }
        .word-block.done-word   { border-bottom: 3px solid var(--green); }
        .word-heb-text { font-size: 44px; font-family: 'Times New Roman', serif; color: var(--text-primary); line-height: 1.2; }
        .word-sbl { font-size: 15px; font-family: var(--font-serif); color: var(--text-primary); opacity: 0.55; font-weight: 500; }

        /* ESV STRIP */
        .esv-strip { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.4rem 1rem; min-height: 50px; flex-shrink: 0; }
        .esv-label { font-size: 9px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; margin-bottom: 2px; }
        .esv-text  { font-family: var(--font-serif); font-size: 14px; color: var(--text-secondary); line-height: 1.4; }
        .esv-highlight { color: var(--text-primary); font-weight: 600; background: var(--purple-light); padding: 0 3px; border-radius: 3px; }

        /* LETTER INPUT MODULE */
        .letter-module { display: flex; gap: 10px; flex-shrink: 0; height: 160px; }

        /* Left: letter reveal — scrollable */
        .letter-reveal {
            flex: 3;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 0.75rem 1rem;
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .lr-empty { font-family: var(--font-serif); font-size: 14px; color: var(--text-muted); font-style: italic; }
        .lr-type-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 8px; border-radius: var(--radius-pill); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
        .lr-type-badge.type-root   { background: rgba(255,95,64,0.12); color: var(--coral); }
        .lr-type-badge.type-prefix { background: rgba(58,134,255,0.12); color: var(--blue); }
        .lr-type-badge.type-suffix { background: rgba(0,191,165,0.12);  color: var(--teal); }
        .lr-type-badge.type-normal { background: var(--bg-surface); color: var(--text-muted); }
        .lr-letter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .lr-char { font-size: 48px; font-family: 'Times New Roman', serif; color: var(--text-primary); line-height: 1; min-width: 44px; text-align: center; }
        .lr-char.type-root   { color: var(--coral); }
        .lr-char.type-prefix { color: var(--blue); }
        .lr-char.type-suffix { color: var(--teal); }
        .lr-right { flex: 1; }
        .lr-name    { font-size: 15px; font-weight: 600; color: var(--text-primary); line-height: 1.2; font-family: 'Calibri', 'Candara', 'Segoe UI', sans-serif; }
        .lr-meaning { font-size: 12px; color: var(--text-primary); opacity: 0.7; font-family: 'Calibri', 'Candara', 'Segoe UI', sans-serif; margin-bottom: 5px; }
        .lr-desc    { font-size: 12.5px; color: var(--text-primary); font-family: 'Calibri', 'Candara', 'Segoe UI', sans-serif; line-height: 1.6; border-left: 2px solid var(--border-mid); padding-left: 8px; }

        /* Right: word builder — two columns */
        .word-builder {
            flex: 2;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 0.875rem 1rem;
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: row;
            align-items: center;
            overflow: hidden;
            gap: 12px;
        }
        /* Left col: gloss + sbl */
        .wb-info-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            overflow: hidden;
        }
        .wb-gloss { font-family: 'Calibri','Candara','Segoe UI',sans-serif; font-size: 20px; font-weight: 700; color: var(--text-primary); line-height: 1.2; margin-bottom: 3px; }
        .wb-sbl-root { font-size: 12px; color: var(--text-muted); font-family: var(--font-serif); }
        .enter-hint { font-size: 11px; color: var(--purple-mid); font-weight: 600; margin-top: 6px; letter-spacing: 0.3px; }
        /* Right col: Hebrew letters */
        .wb-heb-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .wb-word-row { direction: rtl; display: flex; gap: 2px; align-items: flex-end; margin-bottom: 5px; }
        .wb-letter { display: flex; flex-direction: column; align-items: center; }
        .wb-char { font-size: 34px; font-family: 'Times New Roman', serif; line-height: 1; min-width: 28px; text-align: center; transition: color 0.15s; color: var(--text-primary); }
        .wb-char.pending  { color: var(--border-mid); }
        .wb-char.current  { color: var(--purple-mid); }
        .wb-char.done.type-root   { color: var(--coral); }
        .wb-char.done.type-prefix { color: var(--blue); }
        .wb-char.done.type-suffix { color: var(--teal); }
        .wb-char.done.type-normal { color: var(--text-primary); }
        .wb-sbl-row { direction: rtl; display: flex; gap: 2px; }
        .wb-sbl-char { font-size: 12px; font-family: var(--font-serif); font-style: italic; color: var(--text-muted); min-width: 28px; text-align: center; transition: color 0.15s; }
        .wb-sbl-char.visible { color: var(--text-primary); }
        .wb-error { font-size: 12px; color: var(--red-mid); font-family: var(--font-body); height: 16px; flex-shrink: 0; margin-top: 4px; text-align: center; }

        /* KEYBOARD */
        .keyboard-guide { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 0.5rem 0.6rem; flex-shrink: 0; }
        .kb-rows { display: flex; flex-direction: column; gap: 3px; align-items: center; }
        .kb-row  { display: flex; gap: 2px; }
        .kb-key  { position: relative; width: 44px; height: 48px; background: var(--bg-card); border: 1px solid var(--border-mid); border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 4px; transition: all 0.1s; }
        .kb-key.dim        { opacity: 0.2; }
        .kb-key.active-key { background: var(--purple-light); border-color: var(--purple-mid); }
        .kb-key.wrong-key  { background: var(--red-light); border-color: var(--red-mid); }
        .kb-key.wrong-key .kb-heb, .kb-key.wrong-key .kb-sound { color: var(--red-mid); }
        .kb-anchor { position: absolute; top: 2px; left: 3px; font-size: 9px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; }
        .kb-heb   { font-size: 18px; font-family: 'Times New Roman', serif; color: var(--text-primary); line-height: 1; margin-bottom: 1px; }
        .kb-sound { font-size: 8px; color: var(--text-secondary); font-family: var(--font-serif); font-style: italic; line-height: 1; }

        .footer-note { font-size: 9px; color: var(--text-muted); text-align: center; flex-shrink: 0; margin-top: 3px; }

        @keyframes kb-pulse {
            0%   { transform: scale(1);    box-shadow: 0 0 0 0 rgba(83,74,183,0.6); }
            30%  { transform: scale(1.18); box-shadow: 0 0 0 8px rgba(83,74,183,0.3); }
            60%  { transform: scale(1);    box-shadow: 0 0 0 12px rgba(83,74,183,0); }
            80%  { transform: scale(1.1);  box-shadow: 0 0 0 0 rgba(83,74,183,0.2); }
            100% { transform: scale(1);    box-shadow: 0 0 0 0 rgba(83,74,183,0); }
        }
        .kb-pulse {
            animation: kb-pulse 0.7s ease-in-out 3;
            background: var(--purple-light) !important;
            border-color: var(--purple-mid) !important;
            z-index: 10;
            position: relative;
        }
    </style>
</head>
<body>

    <div class="right-panel">

        <div class="verse-header">
            <span class="verse-ref" id="verse-ref">Genesis 1:1</span>
            <span class="progress-pill" id="verse-progress">verse 1 of 2</span>
        </div>

        <div class="scroll-track">
            <div class="scroll-inner" id="scroll-inner"></div>
        </div>

        <div class="esv-strip">
            <div class="esv-label">English Standard Version</div>
            <div class="esv-text" id="esv-text"></div>
        </div>

        <div class="letter-module">
            <div class="letter-reveal" id="letter-reveal">
                <div class="lr-empty">select a word to begin</div>
            </div>
            <div class="word-builder" id="word-builder">
                <div class="wb-info-col" id="wb-info-col">
                    <div class="wb-gloss" id="wb-gloss"></div>
                    <div class="wb-sbl-root" id="wb-sbl-root"></div>
                </div>
                <div class="wb-heb-col">
                    <div class="wb-word-row" id="wb-word-row"></div>
                    <div class="wb-sbl-row" id="wb-sbl-row"></div>
                    <div class="wb-error" id="wb-error"></div>
                </div>
            </div>
        </div>

        <div class="keyboard-guide">
            <div class="kb-rows" id="kb-rows"></div>
        </div>

        <div class="footer-note">Prototype — Genesis 1:1–2 — Masoretic Text (BHS) — ESV</div>

    </div>

    <script>
        const verses = [
            {
                ref: "Genesis 1:1 — בְּרֵאשִׁית פֶּרֶק א",
                esv: "In the beginning, God created the heavens and the earth.",
                words: [
                    { heb: "בְּרֵאשִׁית", name: "bereshit", sbl: "bĕ·rē·ʾšîṯ", gloss: "in the beginning", root: "ר-א-שׁ", theology: "The root ר-א-ש (Head) paints the picture of a strong, leading force pressing forward. By adding the prefix Bet (Inside), the action moves inward — inside the house of the first. The suffix Yod-Tav seals it as a specific state. Together: inside the house of the primary, driving force, the beginning is established.", esvH: "In the beginning", letters: [{ char: "בְּ", name: "Bet", type: "prefix" }, { char: "רֵ", name: "Resh", type: "root" }, { char: "א", name: "Aleph", type: "root" }, { char: "שִׁ", name: "Shin", type: "root" }, { char: "ית", name: "Yod-Tav", type: "suffix" }] },
                    { heb: "בָּרָא", name: "bara", sbl: "bā·rāʾ", gloss: "he created", root: "ב-ר-א", theology: "The root ב-ר-א combines building a house (Bet) for the head/first (Resh) by divine strength (Aleph). Used only with God as the subject — creation here isn't just making objects; it's the active, divine force carving out a physical space for spiritual presence.", esvH: "created", letters: [{ char: "בָּ", name: "Bet", type: "root" }, { char: "רָ", name: "Resh", type: "root" }, { char: "א", name: "Aleph", type: "root" }] },
                    { heb: "אֱלֹהִים", name: "Elohim", sbl: "ʾĕ·lō·hîm", gloss: "God", root: "א-ל-ה", theology: "The root א-ל-ה represents strong authority (El) that is revealed and breathing (He). The suffix ים makes it plural, adding the immense, cascading weight of mighty waters (Mem). Though plural in form, God acts singularly — a massive, revealed authority moving as one.", esvH: "God", letters: [{ char: "אֱ", name: "Aleph", type: "root" }, { char: "לֹ", name: "Lamed", type: "root" }, { char: "הִ", name: "He", type: "root" }, { char: "ים", name: "Yod-Mem", type: "suffix" }] },
                    { heb: "אֵת", name: "et", sbl: "ʾēṯ", gloss: "direct object marker", root: "—", theology: "This word has no English translation. It is a pure grammatical marker pointing to the direct object. Its role here is to connect the verb 'created' to 'the heavens'. Silent but essential — it holds the sentence together without being seen.", esvH: null, letters: [{ char: "אֵ", name: "Aleph", type: "normal" }, { char: "ת", name: "Tav", type: "normal" }] },
                    { heb: "הַשָּׁמַיִם", name: "hashamayim", sbl: "haš·šā·ma·yim", gloss: "the heavens", root: "שׁ-מ-י", theology: "The core holds a tension between consuming fire (Shin) and flowing waters (Mem). The prefix He adds 'Behold' or 'The', drawing attention to this expanse. The heavens are a dynamic, living paradox holding fire and water in perfect balance.", esvH: "the heavens", letters: [{ char: "הַ", name: "He", type: "prefix" }, { char: "שָּׁ", name: "Shin", type: "root" }, { char: "מַ", name: "Mem", type: "root" }, { char: "יִ", name: "Yod", type: "root" }, { char: "ם", name: "Mem sofit", type: "suffix" }] },
                    { heb: "וְאֵת", name: "ve'et", sbl: "wĕ·ʾēṯ", gloss: "and (obj. marker)", root: "—", theology: "The prefix Vav (ו) acts as a hook, adding 'and' to the direct object marker. It points to the second thing being created: the earth. The hook connects, always reaching forward to what comes next.", esvH: null, letters: [{ char: "וְ", name: "Vav", type: "prefix" }, { char: "אֵ", name: "Aleph", type: "normal" }, { char: "ת", name: "Tav", type: "normal" }] },
                    { heb: "הָאָרֶץ", name: "ha'aretz", sbl: "hā·ʾā·reṣ", gloss: "the earth / the land", root: "א-ר-ץ", theology: "The root א-ר-ץ reveals divine strength bringing the heights down to be firmly anchored. The prefix He simply points: 'Behold the...'. The earth isn't just soil; it is the firm, anchored destination where the divine presence touches down.", esvH: "the earth", letters: [{ char: "הָ", name: "He", type: "prefix" }, { char: "אָ", name: "Aleph", type: "root" }, { char: "רֶ", name: "Resh", type: "root" }, { char: "ץ", name: "Tsade sofit", type: "root" }] },
                ]
            },
            {
                ref: "Genesis 1:2 — בְּרֵאשִׁית פֶּרֶק א",
                esv: "The earth was without form and void, and darkness was over the face of the deep. And the Spirit of God was hovering over the face of the waters.",
                words: [
                    { heb: "וְהָאָרֶץ", name: "veha'aretz", sbl: "wĕ·hā·ʾā·reṣ", gloss: "and the earth", root: "א-ר-ץ", theology: "The Vav (hook) at the front connects this verse to the last — 'and the earth'. The same earth just created is immediately described in its raw, unformed state. The hook holds the narrative together across the verse break.", esvH: "The earth", letters: [{ char: "וְ", name: "Vav", type: "prefix" }, { char: "הָ", name: "He", type: "prefix" }, { char: "אָ", name: "Aleph", type: "root" }, { char: "רֶ", name: "Resh", type: "root" }, { char: "ץ", name: "Tsade sofit", type: "root" }] },
                    { heb: "הָיְתָה", name: "hayetah", sbl: "hā·yĕ·ṯāh", gloss: "was / existed", root: "ה-י-ה", theology: "The root ה-י-ה is the root of being itself — the same root as the divine name YHWH. To be, to exist, to become. Here it describes the earth's raw state of being before God speaks order into it.", esvH: "was", letters: [{ char: "הָ", name: "He", type: "root" }, { char: "יְ", name: "Yod", type: "root" }, { char: "תָ", name: "Tav", type: "root" }, { char: "ה", name: "He", type: "suffix" }] },
                    { heb: "תֹהוּ", name: "tohu", sbl: "ṯō·hû", gloss: "formlessness / chaos / waste", root: "—", theology: "Tohu has no traceable root — it is a primeval word that predates the root system. A word for the state before structure that itself has no structure. Chaos named by a word that resists being broken down. The language enacts what it describes.", esvH: "without form", letters: [{ char: "תֹ", name: "Tav", type: "normal" }, { char: "הוּ", name: "He-Vav", type: "normal" }] },
                    { heb: "וָבֹהוּ", name: "vavohu", sbl: "wā·ḇō·hû", gloss: "and void / emptiness", root: "—", theology: "Bohu appears only alongside tohu — always a pair. Together they form a sound: tohu vavohu. Unsettled, unresolved in the mouth. Empty, without form. The pairing itself is the meaning — two words that should not exist holding hands.", esvH: "void", letters: [{ char: "וָ", name: "Vav", type: "prefix" }, { char: "בֹ", name: "Bet", type: "normal" }, { char: "הוּ", name: "He-Vav", type: "normal" }] },
                    { heb: "תְהוֹם", name: "tehom", sbl: "tĕ·hôm", gloss: "the deep / the abyss", root: "ה-ו-מ", theology: "The root ה-ו-מ means to roar, to rush, to surge. Tehom is the roaring place — named for its sound. It echoes the Babylonian chaos-goddess Tiamat. But here she is no goddess — just water, just the deep, over which God hovers calmly before speaking.", esvH: "the deep", letters: [{ char: "תְ", name: "Tav", type: "normal" }, { char: "הוֹ", name: "He-Vav", type: "root" }, { char: "ם", name: "Mem sofit", type: "root" }] },
                    { heb: "וְרוּחַ", name: "veruach", sbl: "wĕ·rû·aḥ", gloss: "spirit / wind / breath", root: "ר-ו-ח", theology: "Ruach carries three meanings at once: spirit, wind, breath. You cannot separate them in Hebrew. The Spirit of God is also the wind of God, also the breath of God — hovering, alive, about to speak into the dark.", esvH: "the Spirit", letters: [{ char: "וְ", name: "Vav", type: "prefix" }, { char: "רוּ", name: "Resh-Vav", type: "root" }, { char: "חַ", name: "Chet", type: "root" }] },
                    { heb: "מְרַחֶפֶת", name: "merachefet", sbl: "mĕ·ra·ḥe·p̄eṯ", gloss: "hovering / sweeping / fluttering", root: "ר-ח-פ", theology: "The root ר-ח-פ appears only twice in the entire Hebrew Bible — here, and in Deuteronomy 32:11, where an eagle hovers protectively over its nest. The Spirit does not hover in uncertainty. It hovers in the posture of a parent over something precious and about to awaken.", esvH: "hovering", letters: [{ char: "מְ", name: "Mem", type: "prefix" }, { char: "רַ", name: "Resh", type: "root" }, { char: "חֶ", name: "Chet", type: "root" }, { char: "פֶ", name: "Pe", type: "root" }, { char: "ת", name: "Tav", type: "suffix" }] },
                ]
            }
        ];

        const letterDescriptions = {
            'א': "Aleph is silent — a vessel carrying the sound placed beneath it. The ox: strength, the first. It begins more Hebrew words than any other letter, yet makes no sound of its own. Power that does not announce itself.",
            'ב': "Bet means house — a dwelling, a threshold, an inside. The entire Torah begins with Bet. Creation begins inside, in relationship, not in abstraction. The house before the world.",
            'ג': "Gimel is the camel — movement, carrying, going toward. The root gamal means to deal bountifully, to carry goodness toward someone. Gimel moves. It does not wait.",
            'ד': "Dalet is a door — a threshold, a path between two spaces. It suggests the place of opening: where you receive guests, where inside meets outside.",
            'ה': "He is breath — the lightest letter, almost a sigh. It means 'behold', to reveal, to show. Notice it appears in אֱלֹהִים and in the divine name. Breath is inside the name of God.",
            'ו': "Vav is a hook, a nail, a peg — the tent peg that holds everything together. As a prefix it means 'and', connecting what came before to what comes after. Vav joins.",
            'ז': "Zayin is a weapon — a sword, a tool that cuts. Sharp, decisive, purposeful. What separates also defines: the weapon that creates boundaries.",
            'ח': "Chet is a fence — a boundary, a division between spaces. It creates the idea of separation, of what is inside versus outside. The fence that makes the sacred possible.",
            'ט': "Tet is a serpent — coiled, surrounding, containing. It carries the idea of something good hidden inside something that looks dangerous. Concealed goodness.",
            'י': "Yod is a hand — specifically, the working hand. The smallest letter in the Hebrew alphabet, yet from it all letters are formed. A single point of creative energy.",
            'כ': "Kaf is the open palm — receptive, holding, containing. The cupped hand ready to receive or to give. It speaks of potential and capacity.",
            'ל': "Lamed is the ox goad — the tool that guides, that teaches by pressing forward. The tallest letter. It points upward, toward learning, toward what is ahead.",
            'מ': "Mem is water — flowing, moving, sustaining life. In its final form it is closed water, contained. In its open form it flows freely. Water: the source of all life.",
            'נ': "Nun is a fish — darting through water, full of life and movement. It speaks of life itself, of continuance, of what swims beneath the surface.",
            'ס': "Samech is a support, a prop — the circular letter that closes in on itself. It holds things up, provides a foundation, surrounds and protects.",
            'ע': "Ayin is an eye — seeing, perceiving, understanding. But it is silent, like Aleph. The eye that sees without speaking. Perception before declaration.",
            'פ': "Pe is a mouth — speech, the opening through which meaning flows. The letter of declaration, of breath becoming word. The mouth that speaks creates.",
            'צ': "Tsade is a fish hook — desire, longing, reaching for something. It speaks of the righteous person bending toward what is good, caught by what is holy.",
            'ק': "Qof is the eye of a needle — the small opening, the tight passage. What is behind, what is at the back of the head, the horizon at the edge of vision.",
            'ר': "Resh is a head — the first, the top, the leader. From Resh comes rosh (head) and bereshit (in the beginning). It speaks of what leads, what comes first.",
            'ש': "Shin is teeth — sharp, consuming, pressing. It carries the fire of transformation: what is consumed becomes energy. Shin also means 'name'.",
            'ת': "Tav is a mark, a sign, a seal — the last letter of the alphabet. In ancient script it was drawn as a cross. It marks completion, covenant, the end that makes the beginning meaningful.",
            'ן': "Nun sofit — Nun at the end of a word. The fish that has reached its destination. Life that has completed its movement through the waters.",
            'ם': "Mem sofit — closed Mem at the end of a word. Water contained, held, sealed. The flow that has found its vessel.",
            'ך': "Kaf sofit — the palm at rest at the end of a word. What was open and receiving has now closed around what it holds.",
            'ץ': "Tsade sofit — desire fulfilled at the end of a word. The fish hook that has caught what it sought.",
            'ף': "Pe sofit — the mouth that has spoken its final word here. Breath released, complete.",
        };

        const hebrewKeyboard = [
            { latin: 'q', heb: '/', name: '', meaning: '', sound: '' },
            { latin: 'w', heb: "'", name: '', meaning: '', sound: '' },
            { latin: 'e', heb: 'ק', name: 'Qof', meaning: 'eye of needle', sound: 'q' },
            { latin: 'r', heb: 'ר', name: 'Resh', meaning: 'head, first', sound: 'r' },
            { latin: 't', heb: 'א', name: 'Aleph', meaning: 'ox, strength', sound: 'ʾ' },
            { latin: 'y', heb: 'ט', name: 'Tet', meaning: 'serpent, surround', sound: 'ṭ' },
            { latin: 'u', heb: 'ו', name: 'Vav', meaning: 'hook, connect', sound: 'v' },
            { latin: 'i', heb: 'ן', name: 'Nun sofit', meaning: 'fish, life', sound: 'n' },
            { latin: 'o', heb: 'ם', name: 'Mem sofit', meaning: 'water, flow', sound: 'm' },
            { latin: 'p', heb: 'פ', name: 'Pe', meaning: 'mouth, speak', sound: 'p/f' },
            { latin: 'a', heb: 'ש', name: 'Shin', meaning: 'teeth, sharp', sound: 'sh/s' },
            { latin: 's', heb: 'ד', name: 'Dalet', meaning: 'door, path', sound: 'd' },
            { latin: 'd', heb: 'ג', name: 'Gimel', meaning: 'camel, move', sound: 'g' },
            { latin: 'f', heb: 'כ', name: 'Kaf', meaning: 'palm, open', sound: 'k/kh' },
            { latin: 'g', heb: 'ע', name: 'Ayin', meaning: 'eye, see', sound: 'ʿ' },
            { latin: 'h', heb: 'י', name: 'Yod', meaning: 'hand, work', sound: 'y' },
            { latin: 'j', heb: 'ח', name: 'Chet', meaning: 'fence, divide', sound: 'ch' },
            { latin: 'k', heb: 'ל', name: 'Lamed', meaning: 'ox goad, learn', sound: 'l' },
            { latin: 'l', heb: 'ך', name: 'Kaf sofit', meaning: 'palm, open', sound: 'kh' },
            { latin: ';', heb: 'ת', name: 'Tav', meaning: 'mark, sign', sound: 't' },
            { latin: 'z', heb: 'ז', name: 'Zayin', meaning: 'weapon, cut', sound: 'z' },
            { latin: 'x', heb: 'ס', name: 'Samech', meaning: 'support, prop', sound: 's' },
            { latin: 'c', heb: 'ב', name: 'Bet', meaning: 'house, inside', sound: 'b/v' },
            { latin: 'v', heb: 'ה', name: 'He', meaning: 'behold, breath', sound: 'h' },
            { latin: 'b', heb: 'נ', name: 'Nun', meaning: 'fish, life', sound: 'n' },
            { latin: 'n', heb: 'מ', name: 'Mem', meaning: 'water, flow', sound: 'm' },
            { latin: 'm', heb: 'צ', name: 'Tsade', meaning: 'fish hook, desire', sound: 'ts' },
            { latin: ',', heb: 'ץ', name: 'Tsade sofit', meaning: 'fish hook, desire', sound: 'ts' },
            { latin: '.', heb: 'ף', name: 'Pe sofit', meaning: 'mouth, speak', sound: 'f' },
        ];

        const qwertyRows = [
            ['q','w','e','r','t','y','u','i','o','p'],
            ['a','s','d','f','g','h','j','k','l',';'],
            ['z','x','c','v','b','n','m',',','.'],
        ];

        const latinToHeb = {};
        const hebToData  = {};
        hebrewKeyboard.forEach(k => { latinToHeb[k.latin] = k.heb; if (k.name) hebToData[k.heb] = k; });

        let currentVerse = 0;
        let activeWordIdx = null;
        let typingState = null;

        function stripNikud(s) { return s.replace(/[\u0591-\u05C7]/g, ''); }

        function getWordLetters(word) { return stripNikud(word.heb).split(''); }

        function getLetterTypes(word) {
            if (!word.letters) return [];
            const types = [];
            word.letters.forEach(l => { stripNikud(l.char).split('').forEach(() => types.push(l.type)); });
            return types;
        }

        function buildActiveHTML(v, idx) {
            return `<div class="verse-inner-wrap">${v.words.map((w, i) =>
                `<div class="word-block ${w.done ? 'done-word' : ''}" id="wb-${idx}-${i}">
                    <span class="word-heb-text">${stripNikud(w.heb)}</span>
                    <span class="word-sbl">${w.sbl}</span>
                </div>`
            ).join('')}</div>`;
        }

        function buildPlainHTML(v) {
            return `<div class="verse-inner-wrap"><div class="verse-plain">${v.words.map(w => stripNikud(w.heb)).join(' ')}</div></div>`;
        }

        function updateScroll(animate) {
            const ACTIVE_H = 160, ADJ_H = 12, TRACK_H = 240;
            const inner = document.getElementById('scroll-inner');
            inner.style.transition = animate ? 'transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94)' : 'none';
            let ty = (TRACK_H / 2) - (ACTIVE_H / 2);
            for (let i = 0; i < currentVerse; i++) ty -= ADJ_H;
            inner.style.transform = `translateY(${ty}px)`;

            verses.forEach((v, idx) => {
                const slot = document.getElementById('slot-' + idx);
                if (!slot) return;
                const dist = Math.abs(idx - currentVerse);
                if      (dist === 0) { slot.className = 'verse-slot active';   slot.innerHTML = buildActiveHTML(v, idx); }
                else if (dist === 1) { slot.className = 'verse-slot adjacent'; slot.innerHTML = buildPlainHTML(v); }
                else                 { slot.className = 'verse-slot hidden';   slot.innerHTML = ''; }
            });

            const v = verses[currentVerse];
            document.getElementById('verse-ref').textContent = v.ref;
            document.getElementById('verse-progress').textContent = 'verse ' + (currentVerse + 1) + ' of ' + verses.length;
            document.getElementById('esv-text').innerHTML = v.esv;
        }

        function renderKeyboard(targetHeb, errorCount, wrongHebs = []) {
            const showHint = errorCount >= 3;
            document.getElementById('kb-rows').innerHTML = qwertyRows.map(row =>
                `<div class="kb-row">${row.map(latin => {
                    const k = hebrewKeyboard.find(x => x.latin === latin);
                    if (!k || !k.name) return `<div class="kb-key dim"><div class="kb-heb" style="font-size:12px;color:var(--text-muted)">${k ? k.heb : ''}</div></div>`;
                    const isTarget = k.heb === targetHeb && showHint;
                    const isWrong  = wrongHebs.includes(k.heb);
                    const cls = isTarget ? 'active-key' : isWrong ? 'wrong-key' : '';
                    const anchor = (latin === 'f' || latin === 'j') ? `<div class="kb-anchor">${latin}</div>` : '';
                    return `<div class="kb-key ${cls}">${anchor}<div class="kb-heb">${k.heb}</div><div class="kb-sound">${k.sound}</div></div>`;
                }).join('')}</div>`
            ).join('');
        }

        function renderLetterReveal(ch, type) {
            const data = hebToData[ch] || { name: ch, meaning: '' };
            const desc = letterDescriptions[ch] || '';
            const typeLabel = (type && type !== 'normal') ? type : null;
            const typeClass = type ? `type-${type}` : '';
            document.getElementById('letter-reveal').innerHTML = `
                ${typeLabel ? `<div class="lr-type-badge ${typeClass}">${typeLabel}</div>` : ''}
                <div class="lr-letter-row">
                    <div class="lr-char ${typeClass}">${ch}</div>
                    <div class="lr-right">
                        <div class="lr-name">${data.name}</div>
                        <div class="lr-meaning">${data.meaning}</div>
                    </div>
                </div>
                ${desc ? `<div class="lr-desc">${desc}</div>` : ''}`;
        }

        function renderWordBuilder(letters, types, typedCount, error) {
            document.getElementById('wb-word-row').innerHTML = letters.map((ch, i) => {
                let cls = 'pending', typeClass = '';
                if (i < typedCount)  { cls = 'done'; typeClass = `type-${types[i] || 'normal'}`; }
                if (i === typedCount) cls = 'current';
                return `<div class="wb-letter"><div class="wb-char ${cls} ${typeClass}">${i < typedCount ? ch : '_'}</div></div>`;
            }).join('');
            document.getElementById('wb-sbl-row').innerHTML = letters.map((ch, i) => {
                const data = hebToData[ch] || { sound: '' };
                const shown = i < typedCount;
                return `<div class="wb-sbl-char ${shown ? 'visible' : ''}">${shown ? (data.sound || '') : '·'}</div>`;
            }).join('');
            document.getElementById('wb-error').textContent = error ? 'wrong letter' : '';
        }

        function renderWordDone(w) {
            const letters = getWordLetters(w);
            const types   = getLetterTypes(w);
            document.getElementById('wb-word-row').innerHTML = letters.map((ch, i) =>
                `<div class="wb-letter"><div class="wb-char done type-${types[i] || 'normal'}">${ch}</div></div>`
            ).join('');
            document.getElementById('wb-sbl-row').innerHTML = letters.map(ch => {
                const data = hebToData[ch] || { sound: '' };
                return `<div class="wb-sbl-char visible">${data.sound || ''}</div>`;
            }).join('');
            document.getElementById('wb-error').textContent = '';
            document.getElementById('wb-gloss').textContent = w.gloss;
            document.getElementById('wb-sbl-root').textContent = w.sbl + ' · root: ' + w.root;
            const old = document.getElementById('wb-enter-hint');
            if (!old) {
                const hint = document.createElement('div');
                hint.className = 'enter-hint'; hint.id = 'wb-enter-hint';
                hint.textContent = 'ENTER to continue →';
                document.getElementById('wb-info-col').appendChild(hint);
            }
            document.getElementById('letter-reveal').innerHTML = `
                <div style="font-size:14px;line-height:1.7;color:var(--text-primary);font-family:'Calibri','Candara','Segoe UI',sans-serif;overflow-y:auto;flex:1;">${w.theology || ''}</div>`;
        }

        function activateWord(idx) {
            document.querySelectorAll('.word-block').forEach(b => b.classList.remove('active-word'));
            const block = document.getElementById('wb-' + currentVerse + '-' + idx);
            if (block) block.classList.add('active-word');
            activeWordIdx = idx;

            const w   = verses[currentVerse].words[idx];
            const esv = verses[currentVerse].esv;
            document.getElementById('esv-text').innerHTML = w.esvH
                ? esv.replace(w.esvH, `<span class="esv-highlight">${w.esvH}</span>`)
                : esv;

            const old = document.getElementById('word-builder').querySelector('.wb-done-reveal');
            if (old) old.remove();
            const hint = document.getElementById('wb-enter-hint');
            if (hint) hint.remove();
            document.getElementById('wb-gloss').textContent = '';
            document.getElementById('wb-sbl-root').textContent = '';

            if (w.done) {
                renderWordDone(w);
                renderKeyboard(null, 0);
            } else {
                const letters = getWordLetters(w);
                const types   = getLetterTypes(w);
                typingState = { word: w, letters, types, typed: 0, error: false, errorCount: 0, wrongHebs: [] };
                document.getElementById('letter-reveal').innerHTML = '<div class="lr-empty">type the first letter</div>';
                document.getElementById('wb-word-row').innerHTML = letters.map(() =>
                    `<div class="wb-letter"><div class="wb-char pending">_</div></div>`).join('');
                document.getElementById('wb-sbl-row').innerHTML = letters.map(() =>
                    `<div class="wb-sbl-char">·</div>`).join('');
                document.getElementById('wb-error').textContent = '';
                renderKeyboard(letters[0], 0);
                resetIdleTimer();
            }
        }

        function handleTyping(key) {
            if (!typingState || typingState.word.done) return;
            const heb = latinToHeb[key.toLowerCase()];
            if (!heb) return;
            const { letters, types, typed } = typingState;
            const expected = letters[typed];

            if (heb === expected) {
                typingState.typed++;
                typingState.error = false;
                typingState.errorCount = 0;
                typingState.wrongHebs = [];

                renderLetterReveal(expected, types[typed]);
                renderWordBuilder(letters, types, typingState.typed, false);

                if (typingState.typed === letters.length) {
                    const w = verses[currentVerse].words[activeWordIdx];
                    w.done = true;
                    document.getElementById('wb-' + currentVerse + '-' + activeWordIdx).classList.add('done-word');
                    renderWordDone(w);
                    renderKeyboard(null, 0);
                } else {
                    renderKeyboard(letters[typingState.typed], 0);
                }
            } else {
                typingState.error = true;
                typingState.errorCount++;
                if (!typingState.wrongHebs.includes(heb)) typingState.wrongHebs.push(heb);
                renderWordBuilder(letters, types, typed, true);
                renderKeyboard(expected, typingState.errorCount, typingState.wrongHebs);
            }
        }

        function clearSelection() {
            document.querySelectorAll('.word-block').forEach(b => b.classList.remove('active-word'));
            activeWordIdx = null; typingState = null;
            document.getElementById('letter-reveal').innerHTML = '<div class="lr-empty">select a word to begin</div>';
            document.getElementById('wb-word-row').innerHTML = '';
            document.getElementById('wb-sbl-row').innerHTML = '';
            document.getElementById('wb-error').textContent = '';
            document.getElementById('wb-gloss').textContent = '';
            document.getElementById('wb-sbl-root').textContent = '';
            const hint = document.getElementById('wb-enter-hint');
            if (hint) hint.remove();
            const old = document.getElementById('word-builder').querySelector('.wb-done-reveal');
            if (old) old.remove();
            document.getElementById('esv-text').innerHTML = verses[currentVerse].esv;
            renderKeyboard(null, 0);
        }

        function moveHighlight(dir) {
            if (activeWordIdx === null) { activateWord(0); return; }
            const next = activeWordIdx + dir;
            if (next < 0) {
                if (currentVerse > 0) { currentVerse--; updateScroll(true); activateWord(verses[currentVerse].words.length - 1); }
                else clearSelection();
            } else if (next >= verses[currentVerse].words.length) {
                if (currentVerse < verses.length - 1) { currentVerse++; updateScroll(true); activateWord(0); }
                else clearSelection();
            } else {
                activateWord(next);
            }
        }

        let idleTimer = null;

        function resetIdleTimer() {
            clearTimeout(idleTimer);
            if (!typingState || typingState.word.done) return;
            idleTimer = setTimeout(pulseActiveKey, 10000);
        }

        function pulseActiveKey() {
            if (!typingState || typingState.word.done) return;
            const expected = typingState.letters[typingState.typed];
            const k = hebrewKeyboard.find(x => x.heb === expected);
            if (!k) return;
            const allKeys = document.querySelectorAll('.kb-key');
            allKeys.forEach(el => {
                const heb = el.querySelector('.kb-heb');
                if (heb && heb.textContent === expected) {
                    el.classList.add('kb-pulse');
                    el.addEventListener('animationend', () => el.classList.remove('kb-pulse'), { once: true });
                }
            });
            idleTimer = setTimeout(pulseActiveKey, 10000);
        }

        document.addEventListener('keydown', e => {
            resetIdleTimer();
            if      (e.key === 'ArrowLeft')  { e.preventDefault(); moveHighlight(1); }
            else if (e.key === 'ArrowRight') { e.preventDefault(); moveHighlight(-1); }
            else if (e.key === 'ArrowDown')  { e.preventDefault(); if (currentVerse < verses.length - 1) { currentVerse++; updateScroll(true); activateWord(0); } }
            else if (e.key === 'ArrowUp')    { e.preventDefault(); if (currentVerse > 0) { currentVerse--; updateScroll(true); activateWord(0); } }
            else if (e.key === 'Escape')     { clearSelection(); }
            else if (e.key === 'Enter') {
                if (activeWordIdx !== null) {
                    const w = verses[currentVerse].words[activeWordIdx];
                    if (w && w.done) { e.preventDefault(); moveHighlight(1); }
                }
            }
            else handleTyping(e.key);
        });

        const inner = document.getElementById('scroll-inner');
        inner.innerHTML = verses.map((v, idx) => `<div class="verse-slot" id="slot-${idx}"></div>`).join('');
        updateScroll(false);
        renderKeyboard(null, 0);
        activateWord(0);
    </script>
</body>
</html>
